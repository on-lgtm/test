<!-- ======================= index.html ======================= -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Startseite – Urlaubsantrag</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #4f9cff, #6dd5fa, #ffffff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 400px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    a.button {
      text-decoration: none;
      background: #ffffff;
      color: #0066cc;
      padding: 15px 25px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      display: inline-block;
      transition: 0.3s;
    }

    a.button:hover {
      background: #0066cc;
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Willkommen</h1>
    <p>Hier können Sie Ihren Urlaubsantrag einreichen.</p>
    <a href="form.html" class="button">Zum Formular</a>
  </div>
</body>
</html>
